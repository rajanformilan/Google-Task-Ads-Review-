<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Reviews - Earn Money</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f7f6;
      color: #333;
    }

    .navbar {
      background: #2c3e50;
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ecf0f1;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-badge {
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f39c12;
      color: #fff;
    }

    .main-content {
      padding: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .hotel-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: transform 0.2s;
      text-align: center;
    }

    .hotel-card:hover {
      transform: translateY(-5px);
    }

    .hotel-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .hotel-card h3 {
      padding: 15px 10px 5px;
      font-size: 1.1rem;
      margin: 0;
    }

    .hotel-card button {
      background-color: #3498db;
      color: white;
      border: none;
      margin: 15px 0;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }

    .hotel-card button:hover {
      background-color: #2980b9;
    }

    /* Modal Styling */
    #review-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    #review-modal h2 { margin-top: 0; color: #2c3e50; }

    #review-modal textarea, #review-modal input, #review-modal select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-submit { background: #27ae60; color: white; border: none; flex: 2; padding: 12px; border-radius: 8px; cursor: pointer; }
    .btn-cancel { background: #e74c3c; color: white; border: none; flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; }

    .stats-bar {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
    .nav-links li a { color: white; text-decoration: none; font-size: 0.9rem; }

    .burger { display: none; cursor: pointer; flex-direction: column; gap: 4px; }
    .burger div { width: 25px; height: 3px; background: white; }

    @media (max-width: 768px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 60px; right: 20px; background: #34495e; padding: 15px; border-radius: 8px; }
      .nav-links.active { display: flex; }
      .burger { display: flex; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">🏨 Review4Pay</div>
    <div class="nav-user">
      <div class="burger" id="burger"><div></div><div></div><div></div></div>
      <ul class="nav-links" id="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Wallet</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </div>

  <div class="main-content">
    <div class="stats-bar">
      <span>👤 <b id="username">User</b> <span id="user-tier" class="status-badge">Free</span></span>
      <span>💰 Balance: <b>Rs. <span id="balance-val">0</span></b></span>
      <span>📅 Tasks: <b><span id="task-count">0</span>/<span id="task-limit">10</span></b></span>
    </div>

    <h2>Available Tasks</h2>
    <div id="hotels-container" class="hotel-grid"></div>
  </div>

  <div id="review-modal">
    <div class="modal-content">
      <h2 id="hotel-name">Hotel Name</h2>
      <p style="font-size: 0.85rem; color: #666;">Provide a genuine 5-star rating to earn your reward.</p>
      <input id="reviewer-name" readonly />
      <select id="review-stars">
        <option value="5">⭐️⭐️⭐️⭐️⭐️ (Excellent)</option>
      </select>
      <textarea id="review-text" rows="4" placeholder="Write at least 10 characters about your 'stay'..."></textarea>
      <div class="modal-actions">
        <button id="submit-review" class="btn-submit">Submit Review</button>
        <button onclick="closeModal()" class="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // --- 1. CONFIGURATION & DATA ---
    const FEE = 50;
    
    // Get Logged In User Info
    const loggedInPhone = localStorage.getItem("loggedInUser") || "default";
    const allUsers = JSON.parse(localStorage.getItem("users") || "{}");
    const user = allUsers[loggedInPhone] || { name: "Guest", isSubscribed: false };

    // Logic Variables
    const isSubscribed = user.isSubscribed === true;
    const MAX_TASKS = isSubscribed ? 14 : 10;
    const REWARD = isSubscribed ? 70 : 65;

    let balance = parseInt(localStorage.getItem("balance")) || 100;
    let reviewsToday = parseInt(localStorage.getItem("reviewsToday")) || 0;
    let reviewedHotels = JSON.parse(localStorage.getItem("reviewedHotels") || "[]");

    // --- 2. INITIALIZE UI ---
    document.getElementById("username").textContent = user.name;
    document.getElementById("reviewer-name").value = user.name;
    document.getElementById("task-limit").textContent = MAX_TASKS;
    const tierBadge = document.getElementById("user-tier");
    
    if(isSubscribed) {
        tierBadge.textContent = "VIP Subscriber";
        tierBadge.style.background = "#9b59b6";
    }

    function updateUI() {
      document.getElementById("balance-val").textContent = balance;
      document.getElementById("task-count").textContent = reviewsToday;
    }
    updateUI();

    // --- 3. GENERATE HOTELS ---
    const hotelsContainer = document.getElementById("hotels-container");
    const cities = ["Kathmandu", "Pokhara", "Chitwan", "Lalitpur", "Butwal", "Dharan"];
    const types = ["Hotel", "Resort", "Grand Inn", "Lodge", "Heritage"];

    for (let i = 1; i <= 60; i++) {
      const name = `${types[i % types.length]} ${cities[i % cities.length]} #${100 + i}`;
      const card = document.createElement("div");
      card.className = "hotel-card";
      card.innerHTML = `
        <img src="https://picsum.photos/400/300?random=${i}" alt="hotel">
        <h3>${name}</h3>
        <button onclick="openModal('${name}')">Review & Earn</button>
      `;
      hotelsContainer.appendChild(card);
    }

    // --- 4. REVIEW LOGIC ---
    let currentHotel = "";

    function openModal(name) {
      currentHotel = name;
      document.getElementById("hotel-name").textContent = name;
      document.getElementById("review-modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("review-modal").style.display = "none";
      document.getElementById("review-text").value = "";
    }

    document.getElementById("submit-review").addEventListener("click", () => {
      const text = document.getElementById("review-text").value.trim();

      if (text.length < 10) {
        alert("Review is too short. Please write at least 10 characters.");
        return;
      }

      if (reviewedHotels.includes(currentHotel)) {
        alert("You have already reviewed this hotel today.");
        return;
      }

      // Applying your specific logic rules
      if (reviewsToday >= MAX_TASKS) {
        alert(`Daily limit reached! ${isSubscribed ? 'Subscribers' : 'Free users'} can only do ${MAX_TASKS} tasks.`);
        return;
      }

      if (balance < FEE) {
        alert("Insufficient balance to pay the Review Security Fee (Rs. 50).");
        return;
      }

      // Process transaction
      balance = (balance - FEE) + REWARD;
      reviewsToday++;
      reviewedHotels.push(currentHotel);

      // Save
      localStorage.setItem("balance", balance);
      localStorage.setItem("reviewsToday", reviewsToday);
      localStorage.setItem("reviewedHotels", JSON.stringify(reviewedHotels));

      updateUI();
      alert(`Success! Rs. ${REWARD} added to your wallet.`);
      closeModal();
    });

    // Logout
    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    // Mobile Menu
    document.getElementById('burger').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('active');
    });
  </script>
</body>
</html>
