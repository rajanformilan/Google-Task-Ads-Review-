<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Balance & Order Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --primary: #2c3e50; --success: #27ae60; --accent: #3498db; --danger: #e74c3c; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2, h3 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    /* Form Styling */
    input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box; }
    button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
    .btn-logout { background: var(--danger); margin-top: 20px; }

    /* History Table */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f8f9fa; color: #7f8c8d; text-transform: uppercase; }
    .amt-plus { color: var(--success); font-weight: bold; }
    .amt-minus { color: var(--danger); font-weight: bold; }
    
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: white; }
    .bg-add { background: var(--success); }
    .bg-deduct { background: var(--danger); }
  </style>
</head>
<body>
<button class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg shadow-blue-500/30 transform transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-blue-400"><a href="dashboard.html">
    Data Center - Check🛫
</a>
</button>
  <div class="container">
    <h2><i class="fas fa-user-shield"></i> Admin Control Panel</h2>

    <div class="card">
      <h3><i class="fas fa-coins"></i> Add / Deduct Balance</h3>
      <input type="text" id="targetMobile" placeholder="User Mobile Number (e.g. 98XXXXXXXX)">
      <input type="number" id="targetAmount" placeholder="Amount (e.g. 500 to add, -200 to deduct)">
      <button onclick="updateAndLogBalance()">Update Balance Now</button>
      <p id="statusMsg" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
    </div>

    <div class="card">
      <h3><i class="fas fa-history"></i> Admin Transaction History</h3>
      <div id="historyTableContainer">
        <table>
          <thead>
            <tr>
              <th>User / Mobile</th>
              <th>Action</th>
              <th>Amount</th>
              <th>Date & Time</th>
            </tr>
          </thead>
          <tbody id="adminLogBody">
            </tbody>
        </table>
      </div>
      <button onclick="clearLogs()" style="background:#bdc3c7; font-size:0.8rem; width:auto; margin-top:10px;">Clear History</button>
    </div>

    <button class="btn-logout" onclick="logout()">Logout Admin</button>
  </div>

  <script>
    // Security
    if (localStorage.getItem("isAdmin") !== "true") { window.location.href = "admin-login.html"; }

    // --- LOGIC: UPDATE & SAVE LOG ---
    function updateAndLogBalance() {
      const mobile = document.getElementById("targetMobile").value.trim();
      const amount = parseFloat(document.getElementById("targetAmount").value);
      const status = document.getElementById("statusMsg");

      if(!mobile || isNaN(amount)) {
        alert("Mobile ra Amount dubai halnus!");
        return;
      }

      const users = JSON.parse(localStorage.getItem("users") || "{}");
      if(!users[mobile]) {
        alert("यो मोबाइल नम्बर भएको युजर भेटिएन!");
        return;
      }

      // 1. Balance update garne (User side ma)
      let currentBal = parseInt(localStorage.getItem("balance")) || 0;
      let newBal = currentBal + amount;
      localStorage.setItem("balance", newBal);

      // 2. Transaction Log banaune (Admin record ko lagi)
      const adminLogs = JSON.parse(localStorage.getItem("adminLogs") || "[]");
      const newLog = {
        name: users[mobile].name,
        mobile: mobile,
        type: amount > 0 ? "ADDED" : "DEDUCTED",
        amount: Math.abs(amount),
        time: new Date().toLocaleString()
      };
      adminLogs.push(newLog);
      localStorage.setItem("adminLogs", JSON.stringify(adminLogs));

      // 3. UI Update
      status.style.color = "green";
      status.textContent = `✅ Done! Rs. ${Math.abs(amount)} ${newLog.type} to ${users[mobile].name}`;
      
      document.getElementById("targetMobile").value = "";
      document.getElementById("targetAmount").value = "";
      
      loadAdminLogs(); // Table refresh garne
    }

    // --- LOGIC: DISPLAY LOGS ---
    function loadAdminLogs() {
      const logBody = document.getElementById("adminLogBody");
      const logs = JSON.parse(localStorage.getItem("adminLogs") || "[]");

      if(logs.length === 0) {
        logBody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No history found.</td></tr>";
        return;
      }

      logBody.innerHTML = "";
      logs.reverse().forEach(log => {
        const typeClass = log.type === "ADDED" ? "bg-add" : "bg-deduct";
        const amtClass = log.type === "ADDED" ? "amt-plus" : "amt-minus";
        const symbol = log.type === "ADDED" ? "+" : "-";

        logBody.innerHTML += `
          <tr>
            <td><strong>${log.name}</strong><br><small>${log.mobile}</small></td>
            <td><span class="status-badge ${typeClass}">${log.type}</span></td>
            <td class="${amtClass}">${symbol} Rs. ${log.amount}</td>
            <td>${log.time}</td>
          </tr>
        `;
      });
    }

    function clearLogs() {
      if(confirm("Pura transaction history delete garne?")) {
        localStorage.setItem("adminLogs", "[]");
        loadAdminLogs();
      }
    }

    function logout() {
      localStorage.removeItem("isAdmin");
      window.location.href = "admin-login.html";
    }

    // Initial Load
    loadAdminLogs();
  </script>
</body>
</html>
