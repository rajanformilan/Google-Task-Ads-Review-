<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Request - Review4Pay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 360px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f7f6;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    
    /* Balance Badge */
    .balance {
      background: #5c2d91;
      color: white;
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    select, input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* Info/QR Box */
    #qr-box {
      display: none;
      background: #fff;
      border: 2px dashed #5c2d91;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    button {
      background-color: #3f51b5;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background-color: #2c387e; }

    .msg {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      display: none;
    }

    .email-btn {
      display: block;
      background: #ff9800;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>Submit Request</h2>
  <div class="balance">Your Balance: Rs <span id="balance">0.00</span></div>

  <label for="type">Request Type:</label>
  <select id="type" onchange="toggleQR()">
    <option value="Withdraw">💸 Withdraw (10% Tax)</option>
    <option value="Recharge">🔋 Recharge (Khalti/Bank)</option>
  </select>

  <div id="qr-box">
    <strong>Admin Payment Details:</strong><br>
    Receiver's name: Rajan Kandel 
    Khalti: 9819210050<br>
    Nabil Bank: 05410017510742
  </div>

  <input type="text" id="method" placeholder="Wallet Name (e.g. eSewa, Khalti)" />
  <input type="number" id="amount" placeholder="Enter Amount (Rs)" />
  <input type="tel" id="number" placeholder="Enter Your ID/Number" />

  <button onclick="submitRequest()">Submit & Generate Email</button>

  <div class="msg" id="msgBox"></div>

  <script>
    const ADMIN_EMAIL = 'milankandel584@gmail.com';

    function updateBalanceUI() {
      const bal = parseFloat(localStorage.getItem("balance") || "100.00");
      document.getElementById("balance").textContent = bal.toFixed(2);
    }

    function toggleQR() {
      const type = document.getElementById("type").value;
      document.getElementById("qr-box").style.display = (type === "Recharge") ? "block" : "none";
      document.getElementById("amount").placeholder = (type === "Withdraw") ? "Min. 1000" : "Min. 300";
    }

    function submitRequest() {
      const type = document.getElementById("type").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const number = document.getElementById("number").value.trim();
      const method = document.getElementById("method").value.trim();
      const msgBox = document.getElementById("msgBox");
      let balance = parseFloat(localStorage.getItem("balance") || "100.00");

      // Validation
      if (!amount || amount <= 0 || !number || !method) {
        alert("⚠️ Please fill all fields correctly.");
        return;
      }

      if (type === "Withdraw") {
        if (amount < 1000) { alert("Min. Withdraw is Rs 1000"); return; }
        if (amount > balance) { alert("❌ Insufficient balance."); return; }
        
        balance -= amount;
        localStorage.setItem("balance", balance.toString());
      } else {
        if (amount < 300) { alert("Min. Recharge is Rs 300"); return; }
      }

      // Prepare Email Content
      const subject = `${type} Request - NPR ${amount}`;
      const body = `--- NEW REQUEST ---%0D%0AType: ${type}%0D%0AMethod: ${method}%0D%0AAmount: Rs ${amount}%0D%0ANumber: ${number}%0D%0ADate: ${new Date().toLocaleString()}`;
      const mailto = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${body}`;

      // Success UI
      msgBox.style.display = "block";
      msgBox.style.color = "green";
      msgBox.innerHTML = `✅ Request Logged!<br><a href="${mailto}" class="email-btn">CONFIRM & SEND EMAIL</a>`;

      updateBalanceUI();
    }

    updateBalanceUI();
  </script>
</body>
</html>
