<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      background: #f4f7f6;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
    
    .balance-box {
      background: #fff; padding: 15px; border-radius: 10px; text-align: center;
      margin-bottom: 20px; border-left: 5px solid #27ae60;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .bal-label { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; display: block; }
    .bal-amt { font-size: 1.5rem; font-weight: bold; color: #27ae60; }

    .form-group { margin-bottom: 15px; }
    label { font-size: 0.85rem; color: #34495e; font-weight: bold; display: block; margin-bottom: 5px; }

    select, input, button {
      width: 100%; padding: 12px; font-size: 15px; border: 1px solid #dcdde1;
      border-radius: 8px; box-sizing: border-box; outline: none;
    }

    /* बैंकको नाम सुरुमा लुकाउनलाई */
    #bank-name-group { display: none; }

    button {
      background-color: #3498db; color: white; border: none; font-weight: bold;
      margin-top: 10px; cursor: pointer; transition: 0.2s;
    }
    button:hover { background-color: #2980b9; }

    .msg {
      text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px;
      font-weight: bold; display: none;
    }
    .back-btn { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h2>Payment Request</h2>

  <div class="balance-box">
    <span class="bal-label">Your Current Balance</span>
    <span class="bal-amt">Rs. <span id="balance-display">0</span></span>
  </div>

  <div class="form-group">
    <label>Transaction Type</label>
    <select id="action-type">
      <option value="Recharge">🔋 Recharge (Min. Rs 300)</option>
      <option value="Withdraw">💸 Withdraw (Min. Rs 1000)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Payment Method</label>
    <select id="wallet-type" onchange="toggleBankInput()">
      <option value="eSewa">eSewa</option>
      <option value="Khalti">Khalti</option>
      <option value="IME Pay">IME Pay</option>
      <option value="Bank Transfer">Bank Transfer</option>
    </select>
  </div>

  <div class="form-group" id="bank-name-group">
    <label>Bank Name</label>
    <input type="text" id="bank-name-input" placeholder="e.g. Nabil Bank, Global IME" />
  </div>

  <div class="form-group">
    <label>Amount (NPR)</label>
    <input type="number" id="amount-input" placeholder="e.g. 1000" />
  </div>

  <div class="form-group">
    <label>Number / Account Number</label>
    <input type="tel" id="phone-input" placeholder="Enter number here" />
  </div>

  <button onclick="processRequest()">Submit Request</button>

  <div id="status-msg" class="msg"></div>
  <a href="home.html" class="back-btn">← Back to Dashboard</a>

  <script>
    function getStoredBalance() {
      let bal = localStorage.getItem("balance");
      return (bal === null) ? 100 : parseFloat(bal);
    }

    function refreshUI() {
      document.getElementById("balance-display").textContent = getStoredBalance().toFixed(2);
    }

    // बैंक इनपुट देखाउने वा लुकाउने लजिक
    function toggleBankInput() {
      const method = document.getElementById("wallet-type").value;
      const bankGroup = document.getElementById("bank-name-group");
      bankGroup.style.display = (method === "Bank Transfer") ? "block" : "none";
    }

    function processRequest() {
      const action = document.getElementById("action-type").value;
      const method = document.getElementById("wallet-type").value;
      const bankName = document.getElementById("bank-name-input").value.trim();
      const amount = parseFloat(document.getElementById("amount-input").value);
      const number = document.getElementById("phone-input").value.trim();
      
      let currentBal = getStoredBalance();

      // १. भ्यालिडेसन (Validation)
      if (!amount || amount <= 0) return showAlert("⚠️ Please enter a valid amount.", "error");
      if (action === "Recharge" && amount < 300) return showAlert("⚠️ Minimum Recharge is Rs. 300", "error");
      if (action === "Withdraw" && amount < 1000) return showAlert("⚠️ Minimum Withdraw is Rs. 1000", "error");
      if (number.length < 8) return showAlert("⚠️ Enter a valid account/phone number.", "error");
      
      // यदि बैंक छानेको छ भने बैंकको नाम खाली हुनुहुँदैन
      if (method === "Bank Transfer" && bankName === "") {
        return showAlert("⚠️ Please enter the Bank Name.", "error");
      }

      if (action === "Withdraw" && amount > currentBal) {
        return showAlert(`❌ Insufficient Balance!`, "error");
      }

      // २. ब्यालेन्स अपडेट
      if (action === "Recharge") {
        currentBal += amount;
      } else {
        currentBal -= amount;
      }
      localStorage.setItem("balance", currentBal.toString());

      // ३. डेटा सेभ
      const newRequest = {
        type: action,
        method: method,
        bank: (method === "Bank Transfer") ? bankName : "N/A",
        amount: amount,
        account: number,
        time: new Date().toLocaleString(),
        status: "Pending"
      };

      const history = JSON.parse(localStorage.getItem("requests") || "[]");
      history.push(newRequest);
      localStorage.setItem("requests", JSON.stringify(history));

      showAlert(`✅ ${action} request submitted!`, "success");
      
      // फिल्ड क्लियर गर्ने
      document.getElementById("amount-input").value = "";
      document.getElementById("phone-input").value = "";
      document.getElementById("bank-name-input").value = "";
      refreshUI();
    }

    function showAlert(text, type) {
      const msgBox = document.getElementById("status-msg");
      msgBox.style.display = "block";
      msgBox.textContent = text;
      msgBox.style.background = (type === "error") ? "#fadbd8" : "#d4edda";
      msgBox.style.color = (type === "error") ? "#943126" : "#155724";
    }

    refreshUI();
  </script>
</body>
</html>
