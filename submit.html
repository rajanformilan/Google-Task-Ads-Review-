<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway - Review4Pay</title>
    <style>
        :root {
            --khalti: #5c2d91;
            --bank: #3f51b5;
            --success: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: #333; margin-top: 0; }

        /* Balance Section */
        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .bal-amt { font-size: 2.2rem; font-weight: bold; }

        /* Tabs */
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #eee;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--khalti); color: white; }

        /* Recharge QR Section */
        .qr-selection {
            display: none;
            text-align: center;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px dashed var(--khalti);
        }
        .option-box { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .pay-option {
            cursor: pointer; padding: 10px; border: 2px solid #eee;
            border-radius: 10px; text-align: center; width: 45%;
        }
        .pay-option.selected { border-color: var(--khalti); background: #f0ebf5; }

        /* Form Controls */
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; color: #555; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        .btn-main {
            width: 100%; padding: 15px; background: var(--bank);
            color: white; border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        .msg {
            margin-top: 15px; padding: 15px; border-radius: 8px;
            display: none; font-weight: 600; line-height: 1.5;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .email-link {
            display: inline-block; background: #ff9800; color: white;
            padding: 10px 15px; text-decoration: none; border-radius: 5px;
            margin-top: 10px; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💳 Payment Hub</h2>

    <div class="balance-card">
        <span style="font-size: 0.9rem; opacity: 0.9;">Available Balance</span>
        <div class="bal-amt">Rs. <span id="display-bal">0.00</span></div>
    </div>

    <div class="tab-buttons">
        <button class="tab-btn active" id="btn-withdraw" onclick="switchMode('Withdraw')">Withdraw</button>
        <button class="tab-btn" id="btn-recharge" onclick="switchMode('Recharge')">Recharge</button>
    </div>

    <div id="recharge-area" style="display: none;">
        <label>Deposit To:</label>
        <div class="option-box">
            <div class="pay-option" id="opt-khalti" onclick="showQR('Khalti')">
                <strong>Khalti</strong><br><small>Instant</small>
            </div>
            <div class="pay-option" id="opt-bank" onclick="showQR('Bank')">
                <strong>Bank</strong><br><small>Nabil Bank</small>
            </div>
        </div>

        <div id="qr-display" class="qr-selection">
            <p id="qr-name" style="font-weight: bold; margin: 0; color: var(--khalti);"></p>
            <div style="background: #eee; height: 150px; margin: 10px 0; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                <span id="qr-text" style="font-weight: bold; padding: 10px; text-align: center;">[QR Code / Info]</span>
            </div>
            <p style="font-size: 0.8rem; color: #666; margin: 0;">Scan & pay before submitting details.</p>
        </div>
    </div>

    <div class="form-group">
        <label id="method-label">Wallet/Bank Name:</label>
        <input type="text" id="method-name" placeholder="e.g. eSewa, Khalti, Nabil Bank">
    </div>

    <div class="form-group">
        <label id="amt-label">Amount (NPR):</label>
        <input type="number" id="amount" placeholder="Min. 1000">
    </div>

    <div class="form-group">
        <label id="acc-label">Account/Wallet ID:</label>
        <input type="text" id="account-id" placeholder="Phone number or Acc No.">
    </div>

    <button class="btn-main" id="submit-btn" onclick="handlePayment()">Submit Request</button>

    <div id="msgBox" class="msg"></div>

    <p style="text-align: center;"><a href="home.html" style="color: #666; text-decoration: none; font-size: 0.9rem;">← Back to Home</a></p>
</div>

<script>
    let currentMode = 'Withdraw';
    const ADMIN_EMAIL = 'shopnixita@gmail.com';

    function getBal() {
        let b = localStorage.getItem('balance');
        return b === null ? 100.00 : parseFloat(b);
    }

    function refreshUI() {
        document.getElementById('display-bal').textContent = getBal().toFixed(2);
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-withdraw').classList.toggle('active', mode === 'Withdraw');
        document.getElementById('btn-recharge').classList.toggle('active', mode === 'Recharge');
        
        document.getElementById('recharge-area').style.display = (mode === 'Recharge') ? 'block' : 'none';
        document.getElementById('qr-display').style.display = 'none';
        
        // UI Text updates
        document.getElementById('amt-label').textContent = (mode === 'Withdraw') ? "Withdraw Amount (10% Tax):" : "Amount Paid (NPR):";
        document.getElementById('amount').placeholder = (mode === 'Withdraw') ? "Min. 1000" : "Min. 300";
        document.getElementById('method-name').placeholder = (mode === 'Withdraw') ? "Where to receive? (e.g. eSewa)" : "Where did you pay? (Khalti/Bank)";
        document.getElementById('submit-btn').textContent = (mode === 'Withdraw') ? "Request Withdrawal" : "Submit Payment Proof";
    }

    function showQR(type) {
        document.getElementById('qr-display').style.display = 'block';
        document.getElementById('qr-name').textContent = type + " Payment Details";
        document.getElementById('opt-khalti').classList.toggle('selected', type === 'Khalti');
        document.getElementById('opt-bank').classList.toggle('selected', type === 'Bank');
        
        const qrBox = document.getElementById('qr-text');
        if(type === 'Khalti') {
            qrBox.innerHTML = "Khalti ID: 9819210050<br>Name: Rajan Kandel";
        } else {
            qrBox.innerHTML = "Nabil Bank Acc: 05410017510742<br>Name: Rajan Kandel";
        }
    }

    function handlePayment() {
        const method = document.getElementById('method-name').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const account = document.getElementById('account-id').value.trim();
        let bal = getBal();

        if(!method || !amount || !account) return alert("Please fill all fields!");

        if(currentMode === 'Withdraw') {
            if(amount < 1000) return showMsg("Minimum withdrawal is Rs. 1000", "error");
            if(amount > bal) return showMsg("Insufficient balance!", "error");

            const tax = amount * 0.10;
            const net = amount - tax;
            
            // Deduct balance
            bal -= amount;
            localStorage.setItem('balance', bal.toFixed(2));
            refreshUI();

            showMsg(`✅ Withdrawal Requested! <br>Rs. ${amount} deducted. <br>You will receive Rs. ${net.toFixed(2)} in your ${method} wallet soon.`, "success");
        } else {
            // Recharge
            if(amount < 300) return showMsg("Minimum recharge is Rs. 300", "error");
            
            const mailLink = `mailto:${ADMIN_EMAIL}?subject=PaymentProof&body=Method: ${method}%0D%0AAmount: ${amount}%0D%0AAccount: ${account}%0D%0A(Please attach screenshot)`;
            
            showMsg(`✅ Request Logged! <br>To complete, you MUST send the screenshot via email: <br><a href="${mailLink}" class="email-link">Click to Send Email to Admin</a>`, "success");
        }
    }

    function showMsg(txt, type) {
        const box = document.getElementById('msgBox');
        box.style.display = 'block';
        box.className = 'msg ' + type;
        box.innerHTML = txt;
    }

    window.onload = refreshUI;
</script>

</body>
</html>
